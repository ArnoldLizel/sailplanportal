    @keyframes bgDrift { from { transform: scale(1.06) translate(0,0); } to { transform: scale(1.06) translate(-1.5%,-1%); } }
    .bg::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 85% 50%, transparent 30%, rgba(0,0,0,.55) 100%), linear-gradient(to right, rgba(8,5,2,.92) 0%, rgba(8,5,2,.65) 45%, rgba(8,5,2,.10) 100%); }
    .grain { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: .06; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 200px 200px; }
    .stage { position: relative; z-index: 10; height: 100vh; display: flex; align-items: center; padding: 0 6vw; }
    .card { width: min(420px, 90vw); padding: 52px 44px 48px; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 4px; backdrop-filter: blur(22px) saturate(1.4); box-shadow: 0 0 0 1px rgba(245,200,66,.07), 0 30px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(245,200,66,.15); animation: cardIn .9s cubic-bezier(.22,1,.36,1) both; }
    @keyframes cardIn { from { opacity:0; transform: translateY(28px) scale(.97); } to { opacity:1; transform: none; } }
    .ornament { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; animation: fadeUp .7s .15s both; }
    .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim)); }
    .ornament-line.right { background: linear-gradient(to left, transparent, var(--gold-dim)); }
    .ornament-icon { font-size: 22px; line-height:1; }
    .title { font-family: "Pirata One", cursive; font-size: clamp(2rem, 5vw, 2.6rem); color: var(--gold); letter-spacing: .04em; line-height: 1; text-shadow: 0 0 40px rgba(245,200,66,.45); animation: fadeUp .7s .2s both; }
    .subtitle { font-family: "Cinzel", serif; font-size: .62rem; letter-spacing: .22em; text-transform: uppercase; color: rgba(253,243,227,.45); margin-top: 6px; animation: fadeUp .7s .28s both; }
    .divider { height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin: 28px 0; animation: fadeUp .7s .32s both; }
    .form { animation: fadeUp .7s .38s both; }
    .field { margin-bottom: 20px; position: relative; }
    .field label { display: block; font-family: "Cinzel", serif; font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 8px; }
    .field-wrap { position: relative; display: flex; align-items: center; }
    .field-icon { position: absolute; left: 14px; color: rgba(245,200,66,.45); font-size: 15px; pointer-events: none; }
    input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 13px 14px 13px 40px; background: rgba(255,255,255,.04); border: 1px solid rgba(245,200,66,.22); border-radius: 3px; color: var(--cream); font-family: "Crimson Pro", serif; font-size: 1rem; outline: none; transition: border-color .25s, box-shadow .25s, background .25s; caret-color: var(--gold); }
    input::placeholder { color: rgba(253,243,227,.28); font-style: italic; }
    input:focus { border-color: rgba(245,200,66,.65); background: rgba(245,200,66,.05); box-shadow: 0 0 0 3px rgba(245,200,66,.1), 0 0 18px rgba(245,200,66,.08); }
    .toggle-pw { position: absolute; right: 13px; background: none; border: none; cursor: pointer; color: rgba(245,200,66,.4); font-size: 14px; padding: 4px; transition: color .2s; }
    .toggle-pw:hover { color: var(--gold); }
    .row-aux { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; font-size: .82rem; }
    .check-label { display: flex; align-items: center; gap: 8px; color: rgba(253,243,227,.5); cursor: pointer; user-select: none; }
    .check-label input[type="checkbox"] { display:none; }
    .custom-check { width: 16px; height: 16px; border: 1px solid rgba(245,200,66,.3); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--gold); transition: background .2s, border-color .2s; }
    .check-label input:checked ~ .custom-check { background: rgba(245,200,66,.15); border-color: var(--gold); }
    .check-label input:checked ~ .custom-check::after { content: "✓"; }
    .check-label:hover { color: rgba(253,243,227,.75); }
    .forgot { font-family: "Cinzel", serif; font-size: .58rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(245,200,66,.5); text-decoration: none; transition: color .2s; }
    .forgot:hover { color: var(--gold); }
    .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, #c9943a 0%, #f5c842 50%, #c9943a 100%); background-size: 200% 100%; background-position: 100% 0; border: none; border-radius: 3px; color: #0d0a07; font-family: "Cinzel", serif; font-size: .72rem; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; cursor: pointer; position: relative; overflow: hidden; transition: background-position .5s, transform .15s, box-shadow .3s; box-shadow: 0 4px 24px rgba(197,148,58,.3); }
    .btn-login:hover { background-position: 0% 0; box-shadow: 0 6px 32px rgba(245,200,66,.45); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }
    .btn-login .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,.25); transform: scale(0); animation: ripple .5s linear; pointer-events: none; }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }
    .auth-error { color: #c0392b; font-family: "Cinzel", serif; font-size: .65rem; letter-spacing: .1em; text-align: center; margin-top: -10px; margin-bottom: 14px; min-height: 20px; }
    .card-footer { margin-top: 28px; text-align: center; font-size: .85rem; color: rgba(253,243,227,.38); animation: fadeUp .7s .48s both; }
    .card-footer a { color: var(--gold-dim); text-decoration: none; font-style: italic; transition: color .2s; }
    .card-footer a:hover { color: var(--gold); }
    .side-quote { position: absolute; bottom: 9vh; left: 6vw; max-width: 340px; animation: fadeUp 1s .6s both; }
    .side-quote blockquote { font-family: "Pirata One", cursive; font-size: clamp(1.05rem, 2.2vw, 1.3rem); color: rgba(253,243,227,.7); line-height: 1.5; text-shadow: 0 2px 12px rgba(0,0,0,.8); }
    .side-quote cite { display: block; margin-top: 8px; font-family: "Cinzel", serif; font-size: .55rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold-dim); }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
    .leaves { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
    .leaf { position: absolute; top: -40px; width: 10px; height: 14px; border-radius: 50% 10% 50% 10%; opacity: 0; animation: fall linear infinite; }
    @keyframes fall { 0% { opacity:0; transform: translate(0,0) rotate(0deg); } 10% { opacity:.7; } 90% { opacity:.5; } 100% { opacity:0; transform: translate(var(--dx), 110vh) rotate(var(--rot)); } }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="grain"></div>
<div class="leaves" id="leaves"></div>

<div class="stage">
  <div class="card">
    <div class="ornament">
      <div class="ornament-line"></div>
      <span class="ornament-icon">⚓</span>
      <div class="ornament-line right"></div>
    </div>
    <h1 class="title">Set Sail</h1>
    <p class="subtitle">The Grand Line Awaits</p>
    <div class="divider"></div>

    <form class="form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Navigator ID</label>
        <div class="field-wrap">
          <span class="field-icon">✦</span>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Secret Code</label>
        <div class="field-wrap">
          <span class="field-icon">🔑</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="pwToggle" aria-label="Toggle password">👁</button>
        </div>
      </div>

      <!-- Error message shown here -->
      <p class="auth-error" id="authError"></p>

      <div class="row-aux">
        <label class="check-label">
          <input type="checkbox" id="remember" />
          <span class="custom-check"></span>
          Remember me
        </label>
        <a href="#" class="forgot">Forgot code?</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">⚓ &nbsp; Board the Ship</button>
    </form>

    <div class="card-footer">New to the crew? <a href="#">Join the Straw Hats</a></div>
  </div>

  <div class="side-quote">
    <blockquote>"I don't want to conquer anything. I just think the guy with the most freedom in this whole ocean... is the Pirate King!"</blockquote>
    <cite>— Monkey D. Luffy</cite>
  </div>
</div>

<script>
  /* ─── Password toggle ─── */
  document.getElementById('pwToggle').addEventListener('click', function () {
    var p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
  });

  /* ─── Ripple on button click ─── */
  document.getElementById('loginBtn').addEventListener('click', function (e) {
    var btn = this;
    var r = document.createElement('span');
    r.className = 'ripple';
    var rect = btn.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    r.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (e.clientX - rect.left - size / 2) + 'px;top:' + (e.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(r);
    setTimeout(function () { r.remove(); }, 600);
  });

  /* ─── Login handler with Supabase ─── */
  async function handleLogin(e) {
    e.preventDefault();

    var btn       = document.getElementById('loginBtn');
    var errEl     = document.getElementById('authError');
    var email     = document.getElementById('email').value.trim();
    var password  = document.getElementById('password').value;

    /* Reset error */
    errEl.textContent = '';

    /* Lock the button */
    btn.textContent = '⚓  Casting off…';
    btn.disabled    = true;

    try {
      const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

      if (error) {
        /* Show the error inside the card */
        errEl.textContent = '✦ ' + error.message;
        btn.textContent   = '⚓  Board the Ship';
        btn.disabled      = false;
        return;
      }

      /* ✅ Login successful — redirect */
      btn.textContent = '✦  Welcome Aboard!';
      setTimeout(function () {
        window.location.replace('dashboard_new.html');
      }, 700);

    } catch (err) {
      errEl.textContent = '✦ Unexpected error. Please try again.';
      btn.textContent   = '⚓  Board the Ship';
      btn.disabled      = false;
    }
  }

  /* ─── Falling leaves particle effect ─── */
  var leavesEl = document.getElementById('leaves');
  var colors   = ['#c0392b','#e67e22','#d35400','#e74c3c','#f39c12','#8B4513'];
  for (var i = 0; i < 22; i++) {
    var l    = document.createElement('div');
    l.className = 'leaf';
    var size = 7 + Math.random() * 10;
    l.style.cssText =
      'left:'             + Math.random() * 100 + '%;' +
      'width:'            + size + 'px;' +
      'height:'           + (size * 1.4) + 'px;' +
      'background:'       + colors[Math.floor(Math.random() * colors.length)] + ';' +
      '--dx:'             + (-60 + Math.random() * 120) + 'px;' +
      '--rot:'            + (200 + Math.random() * 400) + 'deg;' +
      'animation-duration:'+ (5 + Math.random() * 10) + 's;' +
      'animation-delay:'  + Math.random() * 12 + 's;' +
      'filter:brightness(' + (.7 + Math.random() * .5) + ');';
    leavesEl.appendChild(l);
  }
</script>
</body>
</html>
